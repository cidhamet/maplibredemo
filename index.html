<!DOCTYPE html>
<html lang="en">

<head>

	<meta charset="UTF-8" />

	<title>MapLibre Example</title>

	<script src="https://unpkg.com/maplibre-gl@5/dist/maplibre-gl.js"></script>
	<link rel="stylesheet" href="https://unpkg.com/maplibre-gl@5/dist/maplibre-gl.css" />

	<style>

		html, body, #map {
			margin: 0;
			height: 100%;
			width: 100%;
		}

	</style>

</head>

<body>

	<div id="map"></div>

	<script>

		const map = new maplibregl.Map({

			container: 'map',
			center: [-79.3832, 43.6532],
			zoom: 10,
			style: 'map-style.json',

		});
		
		map.addControl(new maplibregl.NavigationControl());


		
	
		 map.on('load', () => {

		 	map.addSource('transit-lines', {
		 		type: 'geojson',
		 		data: 'current-lines.geo.json',
		 	});
			map.addSource('traffic-collisions', {
		 		type: 'geojson',
		 		data: 'Traffic Collisions - 4326.geojson',
		 	});

		 	map.addSource('transit-stations', {
		 		type: 'geojson',
		 		data: 'current-stations.geo.json',
		 	});
			map.addSource('red-light', {
		 		type: 'geojson',
		 		data: 'Red Light Cameras Data - 4326.geojson',
		 	});

		 	map.addLayer({
		 		id: 'transit-lines',
		 		type: 'line',
		 		source: 'transit-lines',
		 		layout: { 'line-cap': 'round', 'line-join': 'round' },
		 		paint: { 'line-color': '#000009', 'line-width': 2 },
		 	});

			 	map.addLayer({
		 		id: 'red-light',
		 		type: 'circle',
		 		source: 'red-light',
		 		paint: {
		 			'circle-radius': 7,
		 			'circle-color': '#913230',
		 			'circle-stroke-width': 1.5,
		 			'circle-stroke-color': '#ffffff',
		 		},
		 	});
		 	map.addLayer({
		 		id: 'transit-stations',
		 		type: 'circle',
		 		source: 'transit-stations',
		 		paint: {
		 			'circle-radius': 8,
		 			'circle-color': '#000080',
		 			'circle-stroke-width': 1.5,
		 			'circle-stroke-color': '#ffffff',
		 		},
		 	});

		 });


	</script>

</body>

</html>
